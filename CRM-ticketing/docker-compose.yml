services:
  postgres:
    container_name: db
    image: postgres:15
    environment:
      POSTGRES_USER: akibaz
      POSTGRES_PASSWORD: akibaz
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm-network
    restart: unless-stopped
  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@akibaz.dev
      PGADMIN_DEFAULT_USERNAME: admin
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - crm-network
    restart: unless-stopped
    depends_on:
      - postgres
volumes:
    postgres_data:
    pgadmin_data:
networks:
    crm-network:
        driver: bridge